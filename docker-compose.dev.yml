# docker-compose.dev.yml
# Development environment — mounts local code for live editing.

services:
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: opensearch-dev
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=OpenSearch!C0mp@ny
      - plugins.security.disabled=false
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -u admin:OpenSearch!C0mp@ny https://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
    stdin_open: true
    tty: true
    working_dir: /app
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=OpenSearch!C0mp@ny
      - OPENSEARCH_USE_SSL=true
      - OPENSEARCH_VERIFY_CERTS=false
    depends_on:
      opensearch:
        condition: service_healthy
