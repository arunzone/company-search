[tox]
minversion = 3.24
envlist = default
isolated_build = True

[testenv]
description = Run tests with linting and type checking
setenv =
    TOXINIDIR = {toxinidir}
    PYTHONDONTWRITEBYTECODE = 1
    PYTHONPATH = {toxinidir}
    PYTHONTRACEMALLOC = 1
    GLOB_EXCLUDE = *.egg-info,*venv*,.git,.github,.mypy_cache,.pytest_cache,__pycache__,build,dist,.tox
passenv =
    HOME
    SETUPTOOLS_*
    OPENSEARCH_HOST
    OPENSEARCH_PORT
    OPENSEARCH_USER
    OPENSEARCH_PASSWORD
extras =
    testing
commands =
    ruff check .
    ruff format --check .
    mypy src
    bandit -r src
    radon cc . -a -s -nb --exclude="{env:GLOB_EXCLUDE}"
    xenon --exclude="{env:GLOB_EXCLUDE}" --max-absolute A --max-modules A --max-average A .
    pytest --junitxml=build/pytest.xml -vv --tb=native --random-order --cov company_search --cov-fail-under=80 --cov-report term-missing --cov-report xml {posargs}

[testenv:format]
description = Format code with ruff
changedir = {toxinidir}
extras =
    testing
commands =
    ruff format .
    ruff check --fix .

[testenv:test]
description = Run tests only
extras =
    testing
commands =
    pytest {posargs}

[testenv:{build,clean}]
description =
    build: Build the package
    clean: Remove build artifacts
skip_install = True
changedir = {toxinidir}
deps =
    build: build[virtualenv]
commands =
    clean: python -c 'import shutil; [shutil.rmtree(p, True) for p in ("build", "dist")]'
    clean: python -c 'import pathlib, shutil; [shutil.rmtree(p, True) for p in pathlib.Path("src").glob("*.egg-info")]'
    build: python -m build {posargs}
